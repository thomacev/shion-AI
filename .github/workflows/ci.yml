name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: shion_test
          POSTGRES_PASSWORD: shion_test659
          POSTGRES_DB: shion_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Database — asyncpg porque tu app corre 100% async
      DATABASE_URL: postgresql+asyncpg://shion_test:shion_test659@localhost:5432/shion_test_db
      DATABASE_TEST_URL: postgresql+asyncpg://shion_test:shion_test659@localhost:5432/shion_test_db
      POSTGRES_USER: shion_test
      POSTGRES_PASSWORD: shion_test659
      POSTGRES_DB: shion_test_db

      # JWT
      SECRET_KEY: test-secret-key-for-ci-only
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 14

      # CORS
      ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:8000"]'

      # App
      APP_NAME: shion-AI
      DEBUG: "true"

      # LLM
      OPENROUTER_API_KEY: sk-or-fake-key-for-ci
      MODEL_NAME: google/gemini-2.5-flash-lite-preview-06-17
      API_V1_STR: /api/v1

      # Redis
      REDIS_URL: redis://localhost:6379
      RATE_LIMIT_ENABLED: "false"
      CACHE_TTL_DEFAULT: 300
      REDIS_PASSWORD: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t shion-ai:ci .