name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: shion_test
          POSTGRES_PASSWORD: shion_test659
          POSTGRES_DB: shion_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shion_test -d shion_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://shion_test:shion_test659@localhost:5432/shion_test_db
      DATABASE_TEST_URL: postgresql+asyncpg://shion_test:shion_test659@localhost:5432/shion_test_db
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: test-secret-key-for-ci-only
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 14
      OPENROUTER_API_KEY: sk-or-fake-key-for-ci
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
      LLM_MODEL: google/gemini-2.5-flash-lite-preview-06-17

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=70

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml